<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LinkMe — iOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(1100px 760px at 50% -8%, #effdfb 0%, rgba(238,241,244,0) 58%),
      #eef1f4;
    font-family:"Geist",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    min-height:100%;padding:32px;box-sizing:border-box;
  }
  #stage{display:flex;align-items:center;justify-content:center;}
  .lm-scroll::-webkit-scrollbar{width:0;height:0;}
  .lm-scroll{scrollbar-width:none;}
  *{ -webkit-tap-highlight-color: transparent; }
  @keyframes lmwave { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1)} }
  @keyframes lmpulse { 0%{transform:scale(1);opacity:.45} 70%{opacity:0} 100%{transform:scale(1.9);opacity:0} }
  @keyframes lmfade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
  @keyframes lmspin { to{transform:rotate(360deg)} }
  @keyframes lmblink { 0%,100%{opacity:1} 50%{opacity:0} }
  .lmfade{ opacity:1; }
  .lm-reduce *{ animation: none !important; }
</style>
</head>
<body>
<div id="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="frames/tweaks-panel.jsx"></script>
<script type="text/babel" src="app/kit.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/screens-onboarding.jsx"></script>
<script type="text/babel" src="app/screens-today.jsx"></script>
<script type="text/babel" src="app/screens-capture.jsx"></script>
<script type="text/babel" src="app/screens-person.jsx"></script>
<script type="text/babel" src="app/screens-briefing.jsx"></script>
<script type="text/babel" src="app/screens-followup.jsx"></script>
<script type="text/babel" src="app/screens-shareback.jsx"></script>
<script type="text/babel" src="app/app-root.jsx"></script>
</body>
</html>
